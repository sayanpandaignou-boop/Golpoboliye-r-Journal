<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0906" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="গল্পবলিয়ে" />
  <meta name="description" content="Content Journal for Golpoboliye Obhijatrik — Ongoing from May 2026" />
  <title>গল্পবলিয়ে অভিযাত্রিক</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #0B0906;
      --surface: #110E0B;
      --card:    #161210;
      --cardHov: #1C1815;
      --border:  #2A2218;
      --gold:    #C9A84C;
      --text:    #E8DBC0;
      --muted:   #6B5E48;
      --dim:     #3A3028;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    #root {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 16px env(safe-area-inset-bottom, 60px);
      padding-bottom: max(80px, env(safe-area-inset-bottom, 80px));
    }

    .font-mono  { font-family: 'Space Mono', monospace; }
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-body  { font-family: 'EB Garamond', serif; }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }
    .header-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 6vw, 40px);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .header-dates {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 18px;
    }

    /* ── Stats ── */
    .stats-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .stat-item { text-align: center; }
    .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--gold);
      font-weight: 700;
      line-height: 1;
    }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-top: 2px;
    }

    /* ── Progress bar ── */
    .progress-wrap { max-width: 260px; margin: 0 auto 14px; }
    .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
    .progress-label {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--dim);
      margin-top: 4px;
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* ── View switcher ── */
    .view-switcher {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .view-btn {
      background: none;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold);
      border-radius: 5px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .view-btn.active { background: var(--gold); color: var(--bg); }

    /* ── Week nav ── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .ghost-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--gold);
      border-radius: 6px;
      padding: 8px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .ghost-btn:disabled { opacity: 0.3; cursor: default; }
    .ghost-btn:not(:disabled):hover { border-color: var(--gold); }
    .week-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); text-align: center; }
    .week-sub { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--muted); letter-spacing: 0.2em; text-align: center; margin-top: 2px; }
    .jump-btn {
      display: block;
      width: 100%;
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 18px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 7-day strip ── */
    .day-strip {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 18px;
    }
    .day-cell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 4px;
      cursor: pointer;
      min-height: 88px;
      position: relative;
      overflow: hidden;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .day-cell.out-of-range { opacity: 0.12; cursor: default; pointer-events: none; }
    .day-cell.selected { background: var(--cardHov); }
    .day-cell .comp-bar { position: absolute; bottom: 0; left: 0; height: 2px; transition: width 0.3s; }
    .day-cell .done-glow { position: absolute; inset: 0; border-radius: 7px; }
    .day-short { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--muted); line-height: 1; }
    .day-num { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.1; margin: 2px 0 3px; }
    .day-num.selected { color: var(--gold); }
    .day-emoji { font-size: 12px; line-height: 1; margin-bottom: 2px; }
    .day-label { font-family: 'Space Mono', monospace; font-size: 7px; line-height: 1.3; color: var(--muted); }
    .day-label.main { color: var(--gold); font-weight: 700; }
    .day-label.special { color: #FFD700; font-weight: 700; }
    .day-titled { font-size: 7px; color: #4A8F7B; margin-top: 3px; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Detail panel ── */
    .detail-panel {
      background: var(--card);
      border-radius: 12px;
      padding: 22px 18px;
      margin-bottom: 28px;
      animation: fadeIn 0.2s ease;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .detail-date { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 5px; }
    .detail-series { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
    .detail-platform { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); }
    .detail-milestone { font-family: 'Space Mono', monospace; font-size: 9px; color: #FFD700; letter-spacing: 0.15em; margin-top: 6px; }
    .save-status { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.1em; transition: color 0.3s; text-align: right; min-height: 14px; }
    .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; margin-top: 4px; -webkit-tap-highlight-color: transparent; }

    /* ── Field label ── */
    .field-label { display: block; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }

    /* ── Input / Textarea ── */
    input[type=text], textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      font-family: 'Playfair Display', serif;
      -webkit-appearance: none;
    }
    input[type=text] { padding: 11px 14px; font-size: 17px; }
    textarea { padding: 11px 14px; font-size: 15px; font-family: 'EB Garamond', serif; line-height: 1.7; resize: vertical; min-height: 110px; }
    input::placeholder, textarea::placeholder { color: var(--dim); font-style: italic; }

    /* ── Category / Tag selectors ── */
    .cat-section { margin-bottom: 20px; }
    .cat-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .cat-chip {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .cat-chip.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }
    .cat-chip.accent-active {
      color: #fff;
    }
    .subcat-group { margin-top: 8px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
    .subcat-label { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--dim); letter-spacing: 0.2em; margin-bottom: 7px; text-transform: uppercase; }
    .subcat-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .subcat-chip {
      font-family: 'Space Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.08em;
      padding: 4px 8px;
      border-radius: 3px;
      border: 1px solid var(--dim);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .subcat-chip.active { border-color: currentColor; color: inherit; background: transparent; opacity: 1; }

    /* ── Task list ── */
    .task-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
    .task-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .task-checkbox {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 3px;
      border: 1.5px solid var(--dim);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-family: monospace;
      transition: all 0.15s;
    }
    .task-text { font-size: 14px; color: #C8B898; transition: all 0.15s; line-height: 1.3; }
    .task-text.done { color: var(--muted); text-decoration: line-through; }

    /* ── Task progress ── */
    .task-progress-row { display: flex; align-items: center; gap: 10px; }
    .task-progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .task-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .task-progress-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); white-space: nowrap; }
    .all-done-badge { color: #4A9F6B; margin-left: 5px; }

    /* ── Footer actions ── */
    .detail-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 16px; }
    .autosave-hint { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--dim); flex: 1; letter-spacing: 0.1em; }
    .small-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 6px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }
    .nav-day-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gold);
      border-radius: 4px;
      padding: 6px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }

    /* ── Week mini list ── */
    .week-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 28px; }
    .week-list-section-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 12px; }
    .week-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 11px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .week-row-date { width: 34px; text-align: center; flex-shrink: 0; }
    .week-row-day-short { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--muted); }
    .week-row-date-num { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1; }
    .week-row-emoji { font-size: 17px; flex-shrink: 0; }
    .week-row-info { flex: 1; min-width: 0; }
    .week-row-title { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .week-row-series { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--dim); margin-top: 2px; }
    .week-row-label { font-family: 'Space Mono', monospace; font-size: 8px; flex-shrink: 0; }
    .dot-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .week-row-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
    .week-tag { font-family: 'Space Mono', monospace; font-size: 6px; padding: 1px 5px; border-radius: 2px; border: 1px solid currentColor; opacity: 0.7; }

    /* ── Overview ── */
    .overview-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 18px; text-align: center; }
    .overview-weeks { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }
    .overview-week { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .overview-week-header { padding: 9px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .overview-week-label { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--muted); letter-spacing: 0.18em; }
    .overview-week-month { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--text); }
    .overview-week-right { display: flex; align-items: center; gap: 8px; }
    .mini-progress { width: 54px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .mini-progress-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }
    .overview-view-btn { background: none; border: 1px solid var(--border); color: var(--gold); border-radius: 4px; padding: 3px 8px; font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 0.1em; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .overview-days { padding: 8px 14px; display: flex; gap: 5px; flex-wrap: wrap; }
    .ov-day-pill { display: flex; align-items: center; gap: 4px; padding: 3px 7px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .ov-day-emoji { font-size: 10px; }
    .ov-day-date { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--muted); }
    .ov-day-title { font-size: 9px; color: #4A8F7B; font-style: italic; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ov-done-check { font-size: 8px; color: #4A9F6B; }

    /* ── Legend ── */
    .legend { border-top: 1px solid var(--border); padding-top: 18px; }
    .legend-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 7px 14px; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-emoji { font-size: 11px; }
    .legend-label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.05em; }

    /* ── Section spacing ── */
    .mb-14 { margin-bottom: 14px; }
    .mb-18 { margin-bottom: 18px; }
    .mb-20 { margin-bottom: 20px; }

    /* ── Install banner ── */
    #install-banner {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 100;
      animation: slideUp 0.3s ease;
    }
    .install-text { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text); letter-spacing: 0.05em; }
    .install-text span { color: var(--gold); }
    .install-actions { display: flex; gap: 8px; }
    .install-btn { background: var(--gold); color: var(--bg); border: none; border-radius: 5px; padding: 8px 16px; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; }
    .dismiss-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 8px 12px; font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; }

    /* ── Data toolbar ── */
    .data-toolbar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .data-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 6px 14px; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .data-btn:hover { border-color: var(--gold); color: var(--gold); }
    .data-btn.danger:hover { border-color: #A84C4C; color: #A84C4C; }
    .data-label { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--dim); letter-spacing: 0.1em; align-self: center; }
    #import-file { display: none; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 10px 20px;
      border-radius: 6px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="toast"></div>
  <input type="file" id="import-file" accept=".json" />

  <script>
  // ─── PWA MANIFEST ─────────────────────────────────────────────────────────
  (function() {
    function makeSvgIcon(size) {
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${size}' height='${size}' viewBox='0 0 ${size} ${size}'><rect width='${size}' height='${size}' fill='%230B0906'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='${Math.round(size*0.45)}' fill='%23C9A84C'>গ</text></svg>`;
      return 'data:image/svg+xml,' + svg;
    }

    const ws=[]; let cur=wkStart(START_DATE);
    while(dateMs(cur)<=dateMs(horizon)){ ws.push(new Date(cur)); cur=addDays(cur,7); }

  // ─── RENDER HELPERS ───────────────────────────────────────────────────────
  function el(tag, attrs={}, ...children) {
    const e = document.createElement(tag);
    Object.entries(attrs).forEach(([k,v]) => {
      if(k==="style" && typeof v==="object") Object.assign(e.style, v);
      else if(k==="class") e.className=v;
      else if(k.startsWith("on") && typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(), v);
      else if(typeof v === "boolean") { if(v) e.setAttribute(k,""); else e.removeAttribute(k); }
      else e.setAttribute(k,v);
    });
    children.forEach(c => {
      if(c==null||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(String(c)) : c);
    });
    return e;
  }
  function div(attrs,...c)  { return el("div",attrs,...c); }
  function span(attrs,...c) { return el("span",attrs,...c); }
  function btn(attrs,...c)  { return el("button",attrs,...c); }

    const s = document.getElementById("save-status");
    if(!s) return;
    s.textContent = state.status==="saved"?"✓ SAVED":state.status==="saving"?"SAVING...":"·";
    s.style.color  = state.status==="saved"?"#4A9F6B":state.status==="saving"?"var(--muted)":"transparent";
  }

  function renderDetailBody() {
    const body = document.getElementById("detail-body");
    if(!body||!state.sel) return;
    body.replaceChildren(buildDetailBody());
  }

  // ─── BUILD FUNCTIONS ──────────────────────────────────────────────────────
  function buildDayStrip() {
    const days = getDays();
    return div({class:"day-strip"},
      ...days.map(date => {
        const ok    = inRange(date);
        const key   = fmtKey(date);
        const m     = ok?getDayMeta(date):null;
        const frac  = doneFrac(date);
        const isSel = state.sel && fmtKey(state.sel)===key;
        const e     = state.entries[key];
        const allDone = frac===1 && e?.tasks?.length>0;
        const cell = div({
          class:"day-cell"+(ok?"":" out-of-range")+(isSel?" selected":""),
          style: {
            border:`1px solid ${isSel?(m?.accent||"var(--gold)"):(allDone?"#2A3A2A":"var(--border)")}`,
            boxShadow: isSel?`0 0 0 1px ${m?.accent||"var(--gold)"}30`:"none",
          },
          onclick: () => { if(ok) selectDay(date); },
        });
        if(frac>0) cell.appendChild(div({class:"comp-bar", style:{width:`${frac*100}%`,background:m?.accent||"var(--gold)"}}));
        if(allDone) cell.appendChild(div({class:"done-glow", style:{background:`${m?.accent}08`}}));
        cell.appendChild(span({class:"day-short"},DAY_S[date.getDay()]));
        cell.appendChild(div({class:"day-num"+(isSel?" selected":""), style:{color:isSel?(m?.accent||"var(--gold)"):"var(--text)"}},date.getDate()));
        if(m) {
          cell.appendChild(div({class:"day-emoji"},m.emoji));
          cell.appendChild(div({class:"day-label"+(m.isMain?" main":"")+(m.isSpecial?" special":"")},m.label));
          if(e?.title) cell.appendChild(div({class:"day-titled"},"✓ "+e.title));
        }
        return cell;
      })
    );
  }

  function buildCategorySelector() {
    if(!state.sel) return div({});
    const tk = getTaxonomyKey(state.sel);
    const tax = TAXONOMY[tk];
    if(!tax) return div({});
    const meta = getDayMeta(state.sel);
    const selCats = state.edit.categories || [];
    const selSubs = state.edit.subcategories || {};

    const wrap = div({class:"cat-section"});
    wrap.appendChild(el("label",{class:"field-label"},"Category"));

    // Category chips
    const catRow = div({class:"cat-row"});
    tax.categories.forEach(cat => {
      const isActive = selCats.includes(cat.id);
      const chip = btn({
        class:"cat-chip"+(isActive?" active":""),
        style: isActive ? {background:cat.color,borderColor:cat.color,color:"#fff"} : {},
        onclick: () => toggleCategory(cat.id),
      }, cat.label);
      catRow.appendChild(chip);
    });
    wrap.appendChild(catRow);

    // Subcategory groups for active categories
    selCats.forEach(catId => {
      const cat = tax.categories.find(c=>c.id===catId);
      if(!cat || !cat.subs || cat.subs.length===0) return;
      const group = div({class:"subcat-group"});
      group.appendChild(div({class:"subcat-label"},`${cat.label} — Genres / Types`));
      const subRow = div({class:"subcat-row"});
      cat.subs.forEach(sub => {
        const isSubActive = (selSubs[catId]||[]).includes(sub);
        const chip = btn({
          class:"subcat-chip"+(isSubActive?" active":""),
          style: isSubActive ? {color:cat.color,borderColor:cat.color} : {},
          onclick: () => toggleSubcategory(catId, sub),
        }, sub);
        subRow.appendChild(chip);
      });
      group.appendChild(subRow);
      wrap.appendChild(group);
    });

    return wrap;
  }

  function buildDetailBody() {
    if(!state.sel) return div({});
    const tk = getTaxonomyKey(state.sel);
    const taskList = TASKS[tk] || [];
    const doneCnt = state.edit.tasks.filter(t => t === true).length;
    const pct = taskList.length>0?(doneCnt/taskList.length)*100:0;
    const meta = getDayMeta(state.sel);

    return div({},
      // Title
      div({class:"mb-20"},
        el("label",{class:"field-label"},"Episode / Post Title"),
        el("input",{
          type:"text",
          value: state.edit.title,
          placeholder:"Enter title...",
          style:{fontStyle:state.edit.title?"normal":"italic", borderColor:"var(--border)"},
          oninput: e => updateTitle(e.target.value),
          onfocus: e => e.target.style.borderColor=meta.accent,
          onblur:  e => e.target.style.borderColor="var(--border)",
        })
      ),

      // Categories + Subcategories
      buildCategorySelector(),

      // Tasks
      div({class:"mb-20"},
        el("label",{class:"field-label"},"Production Pipeline"),
        div({class:"task-list"},
          ...taskList.map((task,i) => {
            const done = state.edit.tasks[i] === true;
            return div({
              class:"task-row"+(done?" done":""),
              style:{
                background: done?`${meta.accent}0A`:"transparent",
                border:`1px solid ${done?meta.accent+"40":"var(--border)"}`,
              },
              onclick:()=>toggleTask(i),
            },
              div({class:"task-checkbox", style:{
                border:`1.5px solid ${done?meta.accent:"var(--dim)"}`,
                background:done?`${meta.accent}25`:"transparent",
                color:meta.accent,
              }},done?"✓":""),
              span({class:"task-text"+(done?" done":"")},task)
            );
          })
        ),
        div({class:"task-progress-row"},
          div({class:"task-progress-track"},
            div({class:"task-progress-fill",style:{width:`${pct}%`,background:meta.accent}})
          ),
          div({class:"task-progress-label"},
            `${doneCnt}/${taskList.length}`,
            doneCnt===taskList.length && taskList.length>0
              ? span({class:"all-done-badge"},"ALL DONE") : null
          )
        )
      ),

      // Notes
      div({class:"mb-20"},
        el("label",{class:"field-label"},"Notes / Script Ideas / References"),
        el("textarea",{
          placeholder:"Script ideas, lore references, thumbnail concepts, SEO notes...",
          rows:5,
          style:{borderColor:"var(--border)"},
          oninput: e=>updateNotes(e.target.value),
          onfocus: e=>e.target.style.borderColor=meta.accent,
          onblur:  e=>e.target.style.borderColor="var(--border)",
        },state.edit.notes)
      ),

      // Footer
      div({class:"detail-footer"},
        div({class:"autosave-hint"},"Auto-saved after 1.2s"),
        btn({class:"small-btn",onclick:clearEntry},"Clear"),
        btn({class:"nav-day-btn",onclick:()=>navigateDay(-1)},"← Prev"),
        btn({class:"nav-day-btn",onclick:()=>navigateDay(1)},"Next →"),
      )
    );
  }

  function buildDetail() {
    if(!state.sel) return null;
    const meta  = getDayMeta(state.sel);
    const panel = div({
      id:"detail-panel",
      class:"detail-panel",
      style:{border:`1px solid ${meta.accent}50`,boxShadow:`0 0 40px ${meta.accent}10`},
    });

    const hdr = div({class:"detail-header"},
      div({},
        div({class:"detail-date",style:{color:meta.accent}},
          `${DAY_F[state.sel.getDay()]} · ${MONTHS[state.sel.getMonth()]} ${state.sel.getDate()}, ${state.sel.getFullYear()}`
        ),
        div({class:"detail-series"},`${meta.emoji} ${meta.series}`),
        div({class:"detail-platform"},`${meta.platform} · ${meta.format}`),
        meta.isSpecial ? div({class:"detail-milestone"},"★ 1-YEAR MILESTONE ★") : null,
      ),
      div({style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}},
        div({id:"save-status",class:"save-status",style:{color:"transparent"}},"·"),
        btn({class:"close-btn",onclick:clearSel},"✕"),
      )
    );
    panel.appendChild(hdr);

    const body = div({id:"detail-body"});
    body.appendChild(buildDetailBody());
    panel.appendChild(body);
    return panel;
  }

  function buildWeekList() {
    const days = getDays();
    return div({class:"mb-20"},
      div({class:"week-list-section-title"},"This Week's Schedule"),
      div({class:"week-list"},
        ...days.filter(d=>inRange(d)).map(date => {
          const m    = getDayMeta(date);
          const e    = state.entries[fmtKey(date)];
          const frac = doneFrac(date);
          // Collect active category labels for display
          const selCats = e?.categories || [];
          const tk = getTaxonomyKey(date);
          const tax = TAXONOMY[tk];
          const catLabels = selCats.map(cid => tax?.categories.find(c=>c.id===cid)?.label).filter(Boolean);

          return div({
            class:"week-row",
            onclick:()=>selectDay(date),
            onmouseenter: ev=>ev.currentTarget.style.borderColor=m.accent+"60",
            onmouseleave: ev=>ev.currentTarget.style.borderColor="var(--border)",
          },
            div({class:"week-row-date"},
              div({class:"week-row-day-short"},DAY_S[date.getDay()]),
              div({class:"week-row-date-num"},date.getDate()),
            ),
            div({class:"week-row-emoji"},m.emoji),
            div({class:"week-row-info"},
              div({class:"week-row-title",style:{color:e?.title?"var(--text)":"var(--muted)",fontStyle:e?.title?"normal":"italic"}},
                e?.title||"Untitled — click to fill in"
              ),
              div({class:"week-row-series"},m.series),
              catLabels.length>0 ? div({class:"week-row-tags"},
                ...catLabels.map(l=>span({class:"week-tag",style:{color:m.accent}},l))
              ) : null,
            ),
            div({class:"week-row-label",style:{color:m.isMain||m.isSpecial?m.accent:"var(--dim)",fontWeight:m.isMain?700:400}},m.label),
            frac>0 ? div({class:"dot-indicator",style:{background:frac===1?"#4A9F6B":m.accent}}) : null,
          );
        })
      )
    );
  }

  function buildOverview() {
    const weeks = allWeeks(state.overviewExtra);
    const totalWks = weeks.length;
    return div({},
      div({class:"overview-title"},`Week 1 – Week ${totalWks} · May 2026 · Ongoing`),
      div({class:"overview-weeks"},
        ...weeks.map(wk => {
          const wkDays    = Array.from({length:7},(_,i)=>addDays(wk,i));
          const wkN       = weekNum(wk);
          const wkLbl     = weekLabel(wkDays);
          const validDays = wkDays.filter(inRange);
          const wkDone    = validDays.reduce((a,d)=>a+doneFrac(d),0);
          const wkTotal   = validDays.length;
          const wkPct     = wkTotal>0?wkDone/wkTotal:0;

          return div({class:"overview-week"},
            div({class:"overview-week-header"},
              div({},
                span({class:"overview-week-label"},`WEEK ${wkN} · `),
                span({class:"overview-week-month"},wkLbl),
              ),
              div({class:"overview-week-right"},
                wkPct>0 ? div({class:"mini-progress"},
                  div({class:"mini-progress-fill",style:{width:`${wkPct*100}%`,background:wkPct===1?"#4A9F6B":"var(--gold)"}})
                ) : null,
                btn({class:"overview-view-btn",onclick:()=>goToWeek(wk)},"VIEW"),
              )
            ),
            div({class:"overview-days"},
              ...validDays.map(date => {
                const m    = getDayMeta(date);
                const e    = state.entries[fmtKey(date)];
                const frac = doneFrac(date);
                return div({
                  class:"ov-day-pill",
                  style:{
                    background:frac===1?"#1A2A1A":"var(--surface)",
                    border:`1px solid ${frac>0?m.accent+"40":"var(--border)"}`,
                  },
                  onclick:()=>goToDay(wk,date),
                },
                  span({class:"ov-day-emoji"},m.emoji),
                  div({},
                    div({class:"ov-day-date"},`${DAY_S[date.getDay()]} ${date.getDate()}`),
                    e?.title ? div({class:"ov-day-title"},e.title) : null,
                  ),
                  frac===1 ? span({class:"ov-done-check"},"✓") : null,
                );
              })
            )
          );
        })
      ),
      btn({
        class:"data-btn",
        style:{display:"block",margin:"0 auto 28px",padding:"10px 28px"},
        onclick:()=>{ state.overviewExtra += 12; render(); }
      },"⬇ Load 12 More Weeks"),
    );
  }

  function buildDataToolbar() {
    return div({class:"data-toolbar"},
      span({class:"data-label"},"Data:"),
      btn({class:"data-btn",onclick:exportData},"⬇ Export Backup"),
      btn({class:"data-btn",onclick:importData},"⬆ Import Backup"),
      btn({class:"data-btn danger",onclick:clearAllData},"✕ Clear All"),
    );
  }

  function buildInstallBanner() {
    if(!state.showInstallBanner) return null;
    return div({id:"install-banner"},
      div({class:"install-text"},"Add ",span({},"গল্পবলিয়ে")," to home screen"),
      div({class:"install-actions"},
        btn({class:"dismiss-btn",onclick:dismissInstall},"Later"),
        btn({class:"install-btn",onclick:triggerInstall},"Install"),
      )
    );
  }

  // ─── MAIN RENDER ──────────────────────────────────────────────────────────
  function render() {
    const root = document.getElementById("root");
    const days = getDays();
    const pct  = overallPct();
    const tl   = totalLogged();
    const td   = totalDone();

    root.innerHTML = "";

    const header = el("header",{},
      div({class:"header-eyebrow"},"Content Journal · গল্পবলিয়ে অভিযাত্রিক"),
      el("h1",{},"গল্পবলিয়ে অভিযাত্রিক"),
      div({class:"header-dates"},"May 4, 2026 · Ongoing"),
      div({class:"stats-row"},
        ...[ ["Episodes Titled",tl], ["Tasks Done",td], ["Completion",pct+"%"], ["Week",weekNum(state.ws)] ]
          .map(([l,v])=>div({class:"stat-item"},div({class:"stat-val"},String(v)),div({class:"stat-label"},l)))
      ),
      totalTasks()>0 ? div({class:"progress-wrap"},
        div({class:"progress-track"},div({class:"progress-fill",style:{width:pct+"%"}})),
        div({class:"progress-label"},"OVERALL PROGRESS"),
      ) : null,
      div({class:"view-switcher"},
        btn({class:"view-btn"+(state.view==="week"?" active":""),onclick:()=>switchView("week")},"Weekly View"),
        btn({class:"view-btn"+(state.view==="overview"?" active":""),onclick:()=>switchView("overview")},"Full Overview"),
      )
    );
    root.appendChild(header);
    root.appendChild(buildDataToolbar());

    if(state.view==="week") {
      const nav = div({class:"week-nav"},
        btn({class:"ghost-btn",onclick:prevWeek,disabled:dateMs(state.ws)<=dateMs(wkStart(START_DATE))},"←"),
        div({},
          div({class:"week-title"},weekLabel(days)),
          div({class:"week-sub"},`WEEK ${weekNum(state.ws)}`),
        ),
        btn({class:"ghost-btn",onclick:nextWeek},"→"),
      );
      root.appendChild(nav);
      root.appendChild(btn({class:"jump-btn",onclick:goWeek1},"↩ Jump to Week 1"));
      root.appendChild(buildDayStrip());

      if(state.sel) root.appendChild(buildDetail());
      else root.appendChild(buildWeekList());
    } else {
      root.appendChild(buildOverview());
    }

    root.appendChild(div({class:"legend"},
      div({class:"legend-title"},"Series Legend"),
      div({class:"legend-items"},
        ...[ ["📖","Deep Dive","#9B72CF"],["📣","Promo","#C9A84C"],["👻","Lore Drop","#A84C4C"],
             ["🎙️","Behind the Mic","#4A9F8B"],["🎧","Main Release","#C9A84C"],["🌙","Flex","#5A6878"],["☕","Cozy Reset","#6B9F76"] ]
          .map(([emoji,label,color])=>
            div({class:"legend-item"},
              span({class:"legend-emoji"},emoji),
              span({class:"legend-label",style:{color}},label)
            )
          )
      )
    ));

    const banner = buildInstallBanner();
    if(banner) root.appendChild(banner);
  }

  // ─── PWA INSTALL ──────────────────────────────────────────────────────────
  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault();
    state.deferredPrompt = e;
    state.showInstallBanner = true;
    render();
  });
  window.addEventListener("appinstalled", () => {
    state.showInstallBanner = false;
    state.deferredPrompt = null;
    render();
  });
  function triggerInstall() {
    if(state.deferredPrompt) {
      state.deferredPrompt.prompt();
      state.deferredPrompt.userChoice.then(()=>{
        state.deferredPrompt = null;
        state.showInstallBanner = false;
        render();
      });
    }
  }
  function dismissInstall() { state.showInstallBanner = false; render(); }

  // ─── BOOT ─────────────────────────────────────────────────────────────────
  loadEntries();
  render();
  </script>
</body>
</html>
