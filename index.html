<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0906" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="গল্পবলিয়ে" />
  <meta name="description" content="Content Journal for Golpoboliye Obhijatrik — Ongoing from May 2026" />
  <title>গল্পবলিয়ে অভিযাত্রিক</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #0B0906;
      --surface: #110E0B;
      --card:    #161210;
      --cardHov: #1C1815;
      --border:  #2A2218;
      --gold:    #C9A84C;
      --text:    #E8DBC0;
      --muted:   #6B5E48;
      --dim:     #3A3028;
      color-scheme: dark;
    }

    :root.light {
      --bg:      #F5F0E8;
      --surface: #EDE7DA;
      --card:    #E4DDD0;
      --cardHov: #DAD2C4;
      --border:  #C8BEA8;
      --gold:    #8B6914;
      --text:    #2A2018;
      --muted:   #7A6A52;
      --dim:     #A89880;
      color-scheme: light;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }
    :root.light body::before { opacity: 0.04; filter: invert(1); }

    #root {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 16px env(safe-area-inset-bottom, 60px);
      padding-bottom: max(80px, env(safe-area-inset-bottom, 80px));
    }

    .font-mono  { font-family: 'Space Mono', monospace; }
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-body  { font-family: 'EB Garamond', serif; }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }
    .header-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 6vw, 40px);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .header-dates {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 18px;
    }

    /* ── Stats ── */
    .stats-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .stat-item { text-align: center; }
    .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--gold);
      font-weight: 700;
      line-height: 1;
    }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-top: 2px;
    }

    /* ── Progress bar ── */
    .progress-wrap { max-width: 260px; margin: 0 auto 14px; }
    .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
    .progress-label {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--dim);
      margin-top: 4px;
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* ── View switcher ── */
    .view-switcher {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .view-btn {
      background: none;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold);
      border-radius: 5px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .view-btn.active { background: var(--gold); color: var(--bg); }

    /* ── Week nav ── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .ghost-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--gold);
      border-radius: 6px;
      padding: 8px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .ghost-btn:disabled { opacity: 0.3; cursor: default; }
    .ghost-btn:not(:disabled):hover { border-color: var(--gold); }
    .week-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); text-align: center; }
    .week-sub { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--muted); letter-spacing: 0.2em; text-align: center; margin-top: 2px; }
    .jump-btn {
      display: block;
      width: 100%;
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 18px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 7-day strip ── */
    .day-strip {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 18px;
    }
    .day-cell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 4px;
      cursor: pointer;
      min-height: 88px;
      position: relative;
      overflow: hidden;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .day-cell.out-of-range { opacity: 0.12; cursor: default; pointer-events: none; }
    .day-cell.selected { background: var(--cardHov); }
    .day-cell .comp-bar { position: absolute; bottom: 0; left: 0; height: 2px; transition: width 0.3s; }
    .day-cell .done-glow { position: absolute; inset: 0; border-radius: 7px; }
    .day-short { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--muted); line-height: 1; }
    .day-num { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.1; margin: 2px 0 3px; }
    .day-num.selected { color: var(--gold); }
    .day-emoji { font-size: 12px; line-height: 1; margin-bottom: 2px; }
    .day-label { font-family: 'Space Mono', monospace; font-size: 7px; line-height: 1.3; color: var(--muted); }
    .day-label.main { color: var(--gold); font-weight: 700; }
    .day-label.special { color: #FFD700; font-weight: 700; }
    .day-titled { font-size: 7px; color: #4A8F7B; margin-top: 3px; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Detail panel ── */
    .detail-panel {
      background: var(--card);
      border-radius: 12px;
      padding: 22px 18px;
      margin-bottom: 28px;
      animation: fadeIn 0.2s ease;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .detail-date { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 5px; }
    .detail-series { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
    .detail-platform { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); }
    .detail-milestone { font-family: 'Space Mono', monospace; font-size: 9px; color: #FFD700; letter-spacing: 0.15em; margin-top: 6px; }
    .save-status { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.1em; transition: color 0.3s; text-align: right; min-height: 14px; }
    .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; margin-top: 4px; -webkit-tap-highlight-color: transparent; }

    /* ── Field label ── */
    .field-label { display: block; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }

    /* ── Input / Textarea ── */
    input[type=text], textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      font-family: 'Playfair Display', serif;
      -webkit-appearance: none;
    }
    input[type=text] { padding: 11px 14px; font-size: 17px; }
    textarea { padding: 11px 14px; font-size: 15px; font-family: 'EB Garamond', serif; line-height: 1.7; resize: vertical; min-height: 110px; }
    input::placeholder, textarea::placeholder { color: var(--dim); font-style: italic; }

    /* ── Content type chip selector ── */
    .content-slots-section { margin-bottom: 22px; }
    .slot-chips-label { display: block; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; }
    .slot-chips-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .slot-chip {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 11px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      white-space: nowrap;
    }
    .slot-chip.active { color: #fff; }

    /* ── Slot expanded panel ── */
    .slot-panel {
      margin-top: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 14px 14px;
      animation: fadeIn 0.18s ease;
    }
    .slot-panel-header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 14px;
    }
    .slot-panel-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .slot-scheduled-badge {
      font-family: 'Space Mono', monospace;
      font-size: 7px;
      color: #4A9F6B;
      letter-spacing: 0.1em;
      margin-left: auto;
    }

    /* Sub-options within a slot */
    .slot-subfield { margin-bottom: 11px; }
    .slot-subfield-label {
      font-family: 'Space Mono', monospace;
      font-size: 7px;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .slot-options-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .slot-option-chip {
      font-family: 'Space Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.07em;
      padding: 4px 9px;
      border-radius: 3px;
      border: 1px solid var(--dim);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .slot-option-chip.active { opacity: 1; }

    /* Upload date + scheduled row — REMOVED (replaced by postStatus chips) */

    /* Analytics textarea — REMOVED (replaced by analytics-grid number inputs) */


    /* ── Slot text input ── */
    .slot-text-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      outline: none;
      padding: 8px 11px;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      color-scheme: inherit;
    }
    .slot-text-input[type="date"] {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .slot-text-input::placeholder { color: var(--dim); font-style: italic; }

    /* ── Task list ── */
    .task-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
    .task-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .task-checkbox {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 3px;
      border: 1.5px solid var(--dim);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-family: monospace;
      transition: all 0.15s;
    }
    .task-text { font-size: 14px; color: #C8B898; transition: all 0.15s; line-height: 1.3; }
    .task-text.done { color: var(--muted); text-decoration: line-through; }

    /* ── Task progress ── */
    .task-progress-row { display: flex; align-items: center; gap: 10px; }
    .task-progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .task-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .task-progress-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); white-space: nowrap; }
    .all-done-badge { color: #4A9F6B; margin-left: 5px; }

    /* ── Footer actions ── */
    .detail-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 16px; }
    .autosave-hint { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--dim); flex: 1; letter-spacing: 0.1em; }
    .small-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 6px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }
    .nav-day-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gold);
      border-radius: 4px;
      padding: 6px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }

    /* ── Week mini list ── */
    .week-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 28px; }
    .week-list-section-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 12px; }
    .week-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 11px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .week-row-date { width: 34px; text-align: center; flex-shrink: 0; }
    .week-row-day-short { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--muted); }
    .week-row-date-num { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1; }
    .week-row-emoji { font-size: 17px; flex-shrink: 0; }
    .week-row-info { flex: 1; min-width: 0; }
    .week-row-title { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .week-row-label { font-family: 'Space Mono', monospace; font-size: 8px; flex-shrink: 0; }
    .dot-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .week-row-slots { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .week-slot-badge {
      font-family: 'Space Mono', monospace;
      font-size: 7px;
      color: var(--muted);
      opacity: 0.85;
      white-space: nowrap;
    }

    /* ── Overview ── */
    .overview-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 18px; text-align: center; }
    .overview-weeks { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }
    .overview-week { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .overview-week-header { padding: 9px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .overview-week-label { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--muted); letter-spacing: 0.18em; }
    .overview-week-month { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--text); }
    .overview-week-right { display: flex; align-items: center; gap: 8px; }
    .mini-progress { width: 54px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .mini-progress-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }
    .overview-view-btn { background: none; border: 1px solid var(--border); color: var(--gold); border-radius: 4px; padding: 3px 8px; font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 0.1em; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .overview-days { padding: 8px 14px; display: flex; gap: 5px; flex-wrap: wrap; }
    .ov-day-pill { display: flex; align-items: center; gap: 4px; padding: 3px 7px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .ov-day-emoji { font-size: 10px; }
    .ov-day-date { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--muted); }
    .ov-day-title { font-size: 9px; color: #4A8F7B; font-style: italic; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ov-done-check { font-size: 8px; color: #4A9F6B; }

    /* ── Legend ── */
    .legend { border-top: 1px solid var(--border); padding-top: 18px; }
    .legend-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 7px 14px; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-emoji { font-size: 11px; }
    .legend-label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.05em; }

    /* ── Section spacing ── */
    .mb-14 { margin-bottom: 14px; }
    .mb-18 { margin-bottom: 18px; }
    .mb-20 { margin-bottom: 20px; }
    .mb-12 { margin-bottom: 12px; }

    /* ── Install banner ── */
    #install-banner {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 100;
      animation: slideUp 0.3s ease;
    }
    .install-text { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text); letter-spacing: 0.05em; }
    .install-text span { color: var(--gold); }
    .install-actions { display: flex; gap: 8px; }
    .install-btn { background: var(--gold); color: var(--bg); border: none; border-radius: 5px; padding: 8px 16px; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; }
    .dismiss-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 8px 12px; font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; }

    /* ── Data toolbar ── */
    .data-toolbar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .data-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 6px 14px; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }

             : {emoji:"🎙️",label:"Behind the Mic",accent:"#4A9F8B",platform:"IG · YouTube Shorts",format:"BTS / Animated Poster"},
      5:{emoji:"🎧",label:"MAIN RELEASE",accent:"#C9A84C",isMain:true,platform:"YouTube · IG",format:"Audiobook / AI Image"},
      6:{emoji:"🌙",label:"Flex",accent:"#5A6878",isFlex:true,platform:"Flex Slot",format:"Varies"},
      0:{emoji:"☕",label:"Cozy Reset",accent:"#6B9F76",platform:"IG",format:"AI Image"},
    };
    return META[dow];
  }

  const DAY_S  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const DAY_F  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function fmtKey(d)   { return d.toISOString().split("T")[0]; }
  function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function wkStart(d)  { const x=new Date(d); x.setHours(0,0,0,0); const day=x.getDay(); const diff=(day===0)?-6:1-day; x.setDate(x.getDate()+diff); return x; }
  function dateMs(d)   { return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); }
  function inRange(d)  { return dateMs(d)>=dateMs(START_DATE); }
  function weekNum(ws) { const base=wkStart(START_DATE); return Math.max(1,Math.floor((dateMs(ws)-dateMs(base))/(7*86400000))+1); }
  function currentWeekStart() { return wkStart(new Date()); }
  function weekLabel(days){
    const a=days[0],b=days[6];
    if(a.getMonth()===b.getMonth()) return MONTHS[a.getMonth()]+" "+a.getFullYear();
    return MONTHS[a.getMonth()].slice(0,3)+" – "+MONTHS[b.getMonth()].slice(0,3)+" "+b.getFullYear();
  }

  // ─── STATE ────────────────────────────────────────────────────────────────
  let state = {
    ws: (function(){ const cw=wkStart(new Date()); return dateMs(cw)>=dateMs(wkStart(START_DATE))?cw:wkStart(START_DATE); })(),
    sel: null,
    entries: {},
    // edit shape: { title, caption, hashtags, notes, tasks[], slots:{ctId:{active,postStatus,liveUrl,analyticsViews,...}} }
    edit: { title:"", caption:"", hashtags:"", notes:"", tasks:[], slots: defaultSlots() },
    status: "idle",
    loaded: false,
    view: "week",
    saveTimer: null,
    deferredPrompt: null,
    showInstallBanner: false,
    overviewExtra: 0,
    ideaBankOpen: false,
    ideas: [],
    weekNotes: {},   // key: fmtKey(weekStart) → {focus:"", retro:""}
  };

  // ─── STORAGE ──────────────────────────────────────────────────────────────
  function storageGet(key)      { try { return localStorage.getItem(key); } catch{ return null; } }
  function storageSet(key, val) { try { localStorage.setItem(key, val); } catch{} }
  function storageList(prefix)  {
    const keys = [];
    try { for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(prefix)) keys.push(k); } } catch{}
    return keys;
  }

  function loadEntries() {
    const batch = {};
    const keys = storageList("entry:");
    keys.forEach(k => {
      try { const v=storageGet(k); if(v) batch[k.replace("entry:","")] = JSON.parse(v); } catch{}
    });
    state.entries = batch;
    state.loaded = true;
  }

  function getDefaultTasks(date) {
    const tk = getTaxonomyKey(date);
    return (TASKS[tk] || []).map(() => false);
  }

  function saveEntry() {
    if (!state.sel || !state.loaded) return;
    state.status = "saving";
    renderStatusOnly();
    try {
      const key = fmtKey(state.sel);
      storageSet("entry:"+key, JSON.stringify(state.edit));
      state.entries[key] = {...state.edit};
      state.status = "saved";
      renderStatusOnly();
      setTimeout(() => { state.status="idle"; renderStatusOnly(); }, 2000);
    } catch { state.status="idle"; renderStatusOnly(); }
  }

  function scheduleAutoSave() {
    clearTimeout(state.saveTimer);
    state.status = "idle";
    state.saveTimer = setTimeout(saveEntry, 1200);
  }

  // ─── EXPORT / IMPORT ──────────────────────────────────────────────────────
  function exportData() {
    // Collect all week notes
    const weekNotes = {};
    try {
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith("wknote:")){
          try{ weekNotes[k] = JSON.parse(localStorage.getItem(k)); }catch{}
        }
      }
    } catch{}
    const payload = { app:"golpoboliye", version:4, exported:new Date().toISOString(), entries:state.entries, ideas:state.ideas, weekNotes };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`golpoboliye-backup-${new Date().toISOString().split("T")[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast("✓ Exported successfully");
  }

  function importData() { document.getElementById("import-file").click(); }

  document.getElementById("import-file").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const payload = JSON.parse(ev.target.result);
        if(payload.app !== "golpoboliye" || !payload.entries) { showToast("✗ Invalid backup file"); return; }
        Object.entries(payload.entries).forEach(([k,v]) => {
          storageSet("entry:"+k, JSON.stringify(v));
          state.entries[k] = v;
        });
        // Restore ideas (v4+)
        if(Array.isArray(payload.ideas)) {
          state.ideas = payload.ideas;
          saveIdeas();
        }
        // Restore week notes (v4+)
        if(payload.weekNotes && typeof payload.weekNotes === "object") {
          Object.entries(payload.weekNotes).forEach(([k,v]) => {
            try { storageSet(k, JSON.stringify(v)); } catch{}
          });
        }
        render();
        showToast(`✓ Imported ${Object.keys(payload.entries).length} entries`);
      } catch { showToast("✗ Could not read file"); }
    };
    reader.readAsText(file);
    this.value = "";
  });

  function clearAllData() {
    if(!confirm("Clear ALL entries? This cannot be undone.\n\nExport a backup first if needed.")) return;
    storageList("entry:").forEach(k => { try { localStorage.removeItem(k); } catch{} });
    state.entries = {};
    state.sel = null;
    render();
    showToast("✓ All entries cleared");
  }

  // ─── TOAST ────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
  }

  // ─── COMPUTED ─────────────────────────────────────────────────────────────
  function getDays()   { return Array.from({length:7},(_,i)=>addDays(state.ws,i)); }
  function doneFrac(date) {
    const e = state.entries[fmtKey(date)];
    if (!e?.slots) return 0;
    let total = 0, done = 0;
    CONTENT_TYPES.forEach(ct => {
      const slot = e.slots[ct.id];
      if (slot?.active) {
        const defs = SLOT_TASKS[ct.id] || [];
        total += defs.length;
        done += (slot.tasks || []).filter(t => t === true).length;
      }
    });
    return total > 0 ? done / total : 0;
  }
  function totalLogged() { return Object.keys(state.entries).filter(k=>state.entries[k]?.title).length; }
  function totalDone() {
    return Object.values(state.entries).reduce((a, e) => {
      if (!e?.slots) return a;
      let done = 0;
      CONTENT_TYPES.forEach(ct => {
        const slot = e.slots[ct.id];
        if (slot?.active) done += (slot.tasks || []).filter(t => t === true).length;
      });
      return a + done;
    }, 0);
  }
  function totalTasks() {
    return Object.values(state.entries).reduce((a, e) => {
      if (!e?.slots) return a;
      let total = 0;
      CONTENT_TYPES.forEach(ct => {
        const slot = e.slots[ct.id];
        if (slot?.active) total += (SLOT_TASKS[ct.id] || []).length;
      });
      return a + total;
    }, 0);
  }
  function overallPct()  { const t=totalTasks(); return t>0?Math.round((totalDone()/t)*100):0; }
  function allWeeks(extraWeeks) {
    const horizon = addDays(wkStart(new Date()), (8 + (extraWeeks||0))*7);
    const ws=[]; let cur=wkStart(START_DATE);
    while(dateMs(cur)<=dateMs(horizon)){ ws.push(new Date(cur)); cur=addDays(cur,7); }
    return ws;
  }
  // Get active slots from a saved entry
  function getActiveSlots(entry) {
    if (!entry?.slots) return [];
    return CONTENT_TYPES.filter(ct => entry.slots[ct.id]?.active);
  }

  // ─── SELECTION ────────────────────────────────────────────────────────────
  function selectDay(date) {
    state.sel = date;
    const stored = state.entries[fmtKey(date)];

    // Merge stored slots with defaults (handles old entries + missing keys)
    const defSlots = defaultSlots();
    const mergedSlots = {...defSlots};
    if (stored?.slots) {
      CONTENT_TYPES.forEach(ct => {
        if (stored.slots[ct.id]) {
          const defSlot = defSlots[ct.id];
          const storedSlot = stored.slots[ct.id];
          // Merge tasks: if stored tasks length matches definition, use stored; else reset
          const taskDefs = SLOT_TASKS[ct.id] || [];
          const storedTasks = storedSlot.tasks || [];
          const mergedTasks = storedTasks.length === taskDefs.length
            ? storedTasks
            : taskDefs.map((_, i) => storedTasks[i] === true);
          mergedSlots[ct.id] = { ...defSlot, ...storedSlot, tasks: mergedTasks };
        }
      });
    }

    state.edit = {
      title: stored?.title || "",
      caption: stored?.caption || "",
      hashtags: stored?.hashtags || "",
      notes: stored?.notes || "",
      tasks: [],
      slots: mergedSlots,
    };
    state.status = "idle";
    render();
    setTimeout(() => {
      const panel = document.getElementById("detail-panel");
      if(panel) panel.scrollIntoView({behavior:"smooth",block:"nearest"});
    }, 50);
  }

  function clearSel() { state.sel=null; render(); }

  function toggleSlotTask(ctId, taskIndex) {
    const slots = JSON.parse(JSON.stringify(state.edit.slots || defaultSlots()));
    const ct = CONTENT_TYPES.find(c => c.id === ctId);
    if (!ct) return;
    const slot = slots[ctId] || defaultSlot(ct);
    const tasks = [...(slot.tasks || [])];
    tasks[taskIndex] = !tasks[taskIndex];
    slots[ctId] = { ...slot, tasks };
    state.edit.slots = slots;
    scheduleAutoSave();
    // Surgical DOM update for this slot's task row
    const row = document.getElementById(`slot-task-${ctId}-${taskIndex}`);
    if (row) {
      const done = tasks[taskIndex];
      row.style.background = done ? `${ct.color}0A` : "transparent";
      row.style.border = `1px solid ${done ? ct.color + "40" : "var(--border)"}`;
      const cb = row.querySelector(".task-checkbox");
      if (cb) { cb.style.border = `1.5px solid ${done ? ct.color : "var(--dim)"}`; cb.style.background = done ? `${ct.color}25` : "transparent"; cb.textContent = done ? "✓" : ""; }
      const txt = row.querySelector(".task-text");
      if (txt) txt.className = "task-text" + (done ? " done" : "");
    }
    // Update slot task progress
    const fillEl = document.getElementById(`slot-task-fill-${ctId}`);
    const labelEl = document.getElementById(`slot-task-label-${ctId}`);
    const defs = SLOT_TASKS[ctId] || [];
    const doneCnt = tasks.filter(t => t === true).length;
    const pct = defs.length > 0 ? (doneCnt / defs.length) * 100 : 0;
    if (fillEl) fillEl.style.width = `${pct}%`;
    if (labelEl) {
      const first = labelEl.firstChild;
      if (first && first.nodeType === 3) first.textContent = `${doneCnt}/${defs.length}`;
      const existing = labelEl.querySelector(".all-done-badge");
      if (doneCnt === defs.length && defs.length > 0) {
        if (!existing) { const b = document.createElement("span"); b.className = "all-done-badge"; b.textContent = " ALL DONE"; labelEl.appendChild(b); }
      } else { if (existing) existing.remove(); }
    }
  }

  function prevWeek() {
    const nw = addDays(state.ws,-7);
    if(dateMs(nw) < dateMs(wkStart(START_DATE))) return;
    state.ws=nw; state.sel=null; render();
  }
  function nextWeek() {
    const nw = addDays(state.ws,7);
    state.ws=nw; state.sel=null; render();
  }
  function goWeek1() { state.ws=wkStart(START_DATE); selectDay(START_DATE); }
  function switchView(v) { state.view=v; if(v==="week") state.sel=null; else state.overviewExtra=0; render(); }
  function navigateDay(delta) {
    if(!state.sel) return;
    const next = addDays(state.sel, delta);
    if(dateMs(next) < dateMs(START_DATE)) return;
    const days = getDays();
    if(!days.find(d=>fmtKey(d)===fmtKey(next))) {
      state.ws = wkStart(next);
    }
    selectDay(next);
  }
  function goToWeek(ws) { state.ws=ws; state.sel=null; state.view="week"; render(); }
  function goToDay(ws, date) { state.view="week"; state.ws=ws; selectDay(date); }

  function clearEntry() {
    if(!state.sel) return;
    state.edit = { title:"", caption:"", hashtags:"", notes:"", tasks:[], slots:defaultSlots() };
    scheduleAutoSave();
    render();
  }

  function toggleTask(i) {
    const t = [...state.edit.tasks];
    t[i] = !t[i];
    state.edit.tasks = t;
    scheduleAutoSave();
    // Surgical update: just flip the visual state of this task row
    const taskRows = document.querySelectorAll(".task-row");
    if (taskRows[i]) {
      const done = t[i];
      const meta = getDayMeta(state.sel);
      const row = taskRows[i];
      row.style.background = done ? `${meta.accent}0A` : "transparent";
      row.style.border = `1px solid ${done ? meta.accent+"40" : "var(--border)"}`;
      const checkbox = row.querySelector(".task-checkbox");
      if (checkbox) {
        checkbox.style.border = `1.5px solid ${done ? meta.accent : "var(--dim)"}`;
        checkbox.style.background = done ? `${meta.accent}25` : "transparent";
        checkbox.textContent = done ? "✓" : "";
      }
      const text = row.querySelector(".task-text");
      if (text) {
        text.className = "task-text" + (done ? " done" : "");
      }
      // Update the progress bar
      const tk = getTaxonomyKey(state.sel);
      const taskList = TASKS[tk] || [];
      const doneCnt = t.filter(x => x === true).length;
      const pct = taskList.length > 0 ? (doneCnt / taskList.length) * 100 : 0;
      const fill = document.querySelector(".task-progress-fill");
      if (fill) fill.style.width = `${pct}%`;
      const label = document.querySelector(".task-progress-label");
      if (label) {
        label.textContent = `${doneCnt}/${taskList.length}`;
        if (doneCnt === taskList.length && taskList.length > 0) {
          if (!label.querySelector(".all-done-badge")) {
            const badge = document.createElement("span");
            badge.className = "all-done-badge";
            badge.textContent = "ALL DONE";
            label.appendChild(badge);
          }
        } else {
          const badge = label.querySelector(".all-done-badge");
          if (badge) badge.remove();
        }
      }
    }
  }

  // ─── SLOT FUNCTIONS ───────────────────────────────────────────────────────
  function toggleSlot(ctId) {
    const ct = CONTENT_TYPES.find(c => c.id === ctId);
    if (!ct) return;
    const slots = JSON.parse(JSON.stringify(state.edit.slots || defaultSlots()));
    const cur = slots[ctId] || defaultSlot(ct);
    slots[ctId] = { ...cur, active: !cur.active };
    state.edit.slots = slots;
    scheduleAutoSave();
    // Only rebuild the slots section, not the entire detail body
    const slotsEl = document.getElementById("slots-section");
    if (slotsEl) {
      const newSlots = buildContentSlots();
      newSlots.id = "slots-section";
      slotsEl.replaceWith(newSlots);
    }
  }

  function updateSlotField(ctId, field, value) {
    const ct = CONTENT_TYPES.find(c => c.id === ctId);
    if (!ct) return;
    const slots = JSON.parse(JSON.stringify(state.edit.slots || defaultSlots()));
    const cur = slots[ctId] || defaultSlot(ct);
    slots[ctId] = { ...cur, [field]: value };
    state.edit.slots = slots;
    scheduleAutoSave();
  }

  function updateTitle(val)    { state.edit.title = val; scheduleAutoSave(); }
  function updateCaption(val) {
    state.edit.caption = val;
    scheduleAutoSave();
    // Update counter inline without full re-render
    const counter = document.getElementById("caption-counter");
    if(counter) {

  function updateNotes(val)    { state.edit.notes = val; scheduleAutoSave(); }

  // ─── IDEA BANK ────────────────────────────────────────────────────────────
  function loadIdeas() {
    try { const v = storageGet("ideas"); if(v) state.ideas = JSON.parse(v); } catch{}
  }
  function saveIdeas() {
    try { storageSet("ideas", JSON.stringify(state.ideas)); } catch{}
  }

  // ─── WEEKLY NOTES ─────────────────────────────────────────────────────────
  function weekNoteKey() { return "wknote:" + fmtKey(state.ws); }
  function loadWeekNote() {
    try { const v = storageGet(weekNoteKey()); return v ? JSON.parse(v) : {focus:"",retro:""}; } catch { return {focus:"",retro:""}; }

  function addIdea(text) {

  // ─── CLIPBOARD COPY (works on http + https) ──────────────────────────────
  function fallbackCopy(text) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      showToast(ok ? "✓ Caption copied" : "✗ Copy not available");
    } catch { showToast("✗ Copy not available"); }
  }

  // ─── RENDER HELPERS ───────────────────────────────────────────────────────
  function el(tag, attrs={}, ...children) {
    const e = document.createElement(tag);
    Object.entries(attrs).forEach(([k,v]) => {
      if(k==="style" && typeof v==="object") Object.assign(e.style, v);
      else if(k==="class") e.className=v;
      else if(k.startsWith("on") && typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(), v);
      else if(k==="value") e.value = v !== null && v !== undefined ? String(v) : "";
      else if(k==="disabled") e.disabled = !!v;
      else if(k==="checked") e.checked = !!v;
      else if(k==="rows") e.rows = parseInt(v,10);
      else if(typeof v === "boolean") { if(v) e.setAttribute(k,""); else e.removeAttribute(k); }
      else e.setAttribute(k,v);
    });
    children.forEach(c => {
      if(c==null||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(String(c)) : c);
    });
    return e;
  }
  function div(attrs,...c)  { return el("div",attrs,...c); }
  function span(attrs,...c) { return el("span",attrs,...c); }
  function btn(attrs,...c)  { return el("button",attrs,...c); }

  function renderStatusOnly() {
    const s = document.getElementById("save-status");
    if(!s) return;
    s.textContent = state.status==="saved"?"✓ SAVED":state.status==="saving"?"SAVING...":"·";
    s.style.color  = state.status==="saved"?"#4A9F6B":state.status==="saving"?"var(--muted)":"transparent";
  }

  function renderDetailBody() {
    const body = document.getElementById("detail-body");
    if(!body || !state.sel) return;
    body.replaceChildren(buildDetailBody());
  }

  // ─── BUILD: CONTENT SLOTS ─────────────────────────────────────────────────
  const POST_STATUSES = {
    youtube: [
      { id:"none",      label:"Not Uploaded",    color:"var(--dim)" },
      { id:"scheduled", label:"Scheduled in Studio", color:"#C9A84C" },
      { id:"live",      label:"Live on YouTube",  color:"#4A9F6B" },
      { id:"reviewed",  label:"Analytics Logged", color:"#9B72CF" },
    ],
    instagram: [
      { id:"none",      label:"Not Posted",       color:"var(--dim)" },
      { id:"scheduled", label:"Scheduled",         color:"#C9A84C" },
      { id:"live",      label:"Posted & Live",     color:"#4A9F6B" },
      { id:"reviewed",  label:"Analytics Logged",  color:"#9B72CF" },
    ],
  };
  function getStatuses(ct) { return POST_STATUSES[ct.platform] || POST_STATUSES.youtube; }

  function buildContentSlots() {
    if (!state.sel) return div({});
    const meta = getDayMeta(state.sel);
    const slots = state.edit.slots || defaultSlots();

    const wrap = div({class:"content-slots-section", id:"slots-section"});
    wrap.appendChild(el("label", {class:"slot-chips-label"}, "Content for this day"));

    // Row of content type selector chips
    const chipRow = div({class:"slot-chips-row"});
    CONTENT_TYPES.forEach(ct => {
      const slot = slots[ct.id] || defaultSlot(ct);
      const isActive = !!slot.active;
      const chip = btn({
        class: "slot-chip" + (isActive ? " active" : ""),
        style: isActive
          ? { background: ct.color, borderColor: ct.color, color: "#fff" }
          : { borderColor: "var(--border)" },
        onclick: (e) => { e.stopPropagation(); toggleSlot(ct.id); },
      }, ct.icon + "\u00A0" + ct.label);
      chipRow.appendChild(chip);
    });
    wrap.appendChild(chipRow);

    // Expanded panel for each active slot
    CONTENT_TYPES.forEach(ct => {
      const slot = slots[ct.id] || defaultSlot(ct);
      if (!slot.active) return;

      // Migrate legacy scheduled boolean → postStatus
      const currentStatus = slot.postStatus || (slot.scheduled ? "scheduled" : "none");
      const statuses = getStatuses(ct);

      const panel = div({
        class: "slot-panel",
        style: { borderColor: ct.color + "50", borderLeftWidth: "3px", borderLeftColor: ct.color }
      });

      // Panel header with status badge
      const statusObj = statuses.find(s => s.id === currentStatus) || statuses[0];
      const hdr = div({class:"slot-panel-header"});
      const titleWrap = div({style:{display:"flex",flexDirection:"column",gap:"2px"}});
      titleWrap.appendChild(span({class:"slot-panel-title", style:{color:ct.color}}, ct.icon + "\u00A0" + ct.label));
      titleWrap.appendChild(span({style:{fontFamily:"'Space Mono',monospace",fontSize:"7px",color:"var(--dim)",letterSpacing:"0.1em",textTransform:"uppercase"}}, ct.platformLabel));
      hdr.appendChild(titleWrap);
      hdr.appendChild(span({class:"slot-scheduled-badge", id:`status-badge-${ct.id}`, style:{color:statusObj.color}}, "● " + statusObj.label));
      panel.appendChild(hdr);

      // Sub-fields (genre, language, variant, text inputs)
      ct.fields.forEach(f => {
        const fWrap = div({class:"slot-subfield"});
        fWrap.appendChild(div({class:"slot-subfield-label"}, f.label));
        if (f.type === "text") {
          const textInput = el("input", {
            type: "text",
            class: "slot-text-input",
            placeholder: f.placeholder || "",
          });
          textInput.value = slot[f.key] || "";
          textInput.addEventListener("input",  e => updateSlotField(ct.id, f.key, e.target.value));
          textInput.addEventListener("focus",  e => { e.target.style.borderColor = ct.color; });
          textInput.addEventListener("blur",   e => { e.target.style.borderColor = "var(--border)"; });
          fWrap.appendChild(textInput);
        } else {
          const optRow = div({class:"slot-options-row", id:`opt-row-${ct.id}-${f.key}`});
          (f.options || []).forEach(opt => {
            const isSel = slot[f.key] === opt;
            const chip = btn({
              class: "slot-option-chip" + (isSel ? " active" : ""),
              style: isSel ? { color: ct.color, borderColor: ct.color, background: ct.color + "15" } : {},
              onclick: (e) => {
                e.stopPropagation();
                const currentVal = (state.edit.slots[ct.id] || {})[f.key] || "";
                const newVal = currentVal === opt ? "" : opt;
                updateSlotField(ct.id, f.key, newVal);
                // Surgical update: toggle chip styles in-place
                const row = document.getElementById(`opt-row-${ct.id}-${f.key}`);
                if (row) {
                  row.querySelectorAll(".slot-option-chip").forEach((ch, idx) => {
                    const o = (f.options||[])[idx];
                    const sel = o === newVal;
                    ch.className = "slot-option-chip" + (sel ? " active" : "");
                    ch.style.color = sel ? ct.color : "";
                    ch.style.borderColor = sel ? ct.color : "";
                    ch.style.background = sel ? ct.color + "15" : "";
                  });
                }
              },
            }, opt);
            optRow.appendChild(chip);
          });
          fWrap.appendChild(optRow);
        }
        panel.appendChild(fWrap);
      });

      // ── POST STATUS row (#19) ──────────────────────────────────────────────
      const statusWrap = div({class:"slot-subfield"});
      statusWrap.appendChild(div({class:"slot-subfield-label"}, "Post Status"));
      const statusRow = div({class:"slot-options-row", id:`status-row-${ct.id}`});
      statuses.forEach(ps => {
        const isSel = currentStatus === ps.id;
        const chip = btn({
          class: "slot-option-chip" + (isSel ? " active" : ""),
          style: isSel ? { color: ps.color, borderColor: ps.color, background: ps.color + "18" } : {},
          onclick: (e) => {
            e.stopPropagation();
            updateSlotField(ct.id, "postStatus", ps.id);
            // Surgical update: update chip styles and header badge in-place
            const row = document.getElementById(`status-row-${ct.id}`);
            if (row) {
              const allChips = row.querySelectorAll(".slot-option-chip");
              const thisStatuses = getStatuses(CONTENT_TYPES.find(c=>c.id===ct.id));
              allChips.forEach((ch, idx) => {
                const s = thisStatuses[idx];
                if (!s) return;
                const sel = s.id === ps.id;
                ch.className = "slot-option-chip" + (sel ? " active" : "");
                ch.style.color = sel ? s.color : "";
                ch.style.borderColor = sel ? s.color : "";
                ch.style.background = sel ? s.color + "18" : "";
              });
            }
            // Update header badge
            const badge = document.getElementById(`status-badge-${ct.id}`);
            if (badge) {
              const newStatus = statuses.find(s => s.id === ps.id) || statuses[0];
              badge.textContent = "● " + newStatus.label;
              badge.style.color = newStatus.color;
            }
          },
        }, ps.label);
        statusRow.appendChild(chip);
      });
      statusWrap.appendChild(statusRow);
      panel.appendChild(statusWrap);

      // ── LIVE URL row (#2) ──────────────────────────────────────────────────
      const urlWrap = div({class:"slot-subfield"});
      urlWrap.appendChild(div({class:"slot-subfield-label"}, "Live URL"));
      const urlRow = div({style:{display:"flex",gap:"6px",alignItems:"center"}});
      const urlInput = el("input", {
        type:"text",
        class:"slot-text-input",
        placeholder: ct.urlPlaceholder || "https://...",
        style:{fontFamily:"'Space Mono',monospace",fontSize:"11px",flex:"1"},
      });
      urlInput.value = slot.liveUrl || "";
      urlInput.addEventListener("input", e => updateSlotField(ct.id, "liveUrl", e.target.value));
      urlInput.addEventListener("focus", e => { e.target.style.borderColor = ct.color; });
      urlInput.addEventListener("blur",  e => { e.target.style.borderColor = "var(--border)"; renderDetailBody(); });
      urlRow.appendChild(urlInput);
      if (slot.liveUrl) {
        urlRow.appendChild(btn({
          class:"slot-url-open",
          style:{background:"none",border:"1px solid var(--dim)",color:"var(--gold)",borderRadius:"4px",padding:"6px 8px",fontFamily:"'Space Mono',monospace",fontSize:"8px",cursor:"pointer",whiteSpace:"nowrap"},
          onclick: () => window.open(slot.liveUrl, "_blank"),
        }, "↗ Open"));
      }
      urlWrap.appendChild(urlRow);
      panel.appendChild(urlWrap);

      // ── STRUCTURED ANALYTICS (#3) ──────────────────────────────────────────
      const analyticsWrap = div({class:"slot-subfield"});
      analyticsWrap.appendChild(div({class:"slot-subfield-label"}, "Analytics"));
      const analyticsGrid = div({class:"analytics-grid"});
      const analyticsFields = [
        {key:"analyticsViews",    label:"Views"},
        {key:"analyticsLikes",    label:"Likes"},
        {key:"analyticsComments", label:"Comments"},
        {key:"analyticsSaves",    label:"Saves"},
        {key:"analyticsShares",   label:"Shares"},
        {key:"analyticsReach",    label:"Reach"},
      ];
      analyticsFields.forEach(af => {
        const fieldWrap = div({class:"analytics-field"});
        fieldWrap.appendChild(div({class:"analytics-field-label"}, af.label));
        const inp = el("input", {
          type:"text",
          inputmode:"numeric",
          class:"analytics-field-input",
          placeholder:"—",
        });
        inp.value = slot[af.key] || "";
        inp.addEventListener("input", e => updateSlotField(ct.id, af.key, e.target.value));
        inp.addEventListener("focus", e => { e.target.style.borderColor = ct.color; });
        inp.addEventListener("blur",  e => { e.target.style.borderColor = "var(--border)"; });
        fieldWrap.appendChild(inp);
        analyticsGrid.appendChild(fieldWrap);
      });
      analyticsWrap.appendChild(analyticsGrid);
      panel.appendChild(analyticsWrap);

      // ── SLOT TASK LIST ─────────────────────────────────────────────────────
      const slotTaskDefs = SLOT_TASKS[ct.id] || [];
      if (slotTaskDefs.length > 0) {
        const slotTasks = slot.tasks || slotTaskDefs.map(() => false);
        const slotDoneCnt = slotTasks.filter(t => t === true).length;
        const slotPct = slotTaskDefs.length > 0 ? (slotDoneCnt / slotTaskDefs.length) * 100 : 0;

        const taskWrap = div({class:"slot-subfield"});
        taskWrap.appendChild(div({class:"slot-subfield-label"}, "Production Tasks"));
        const taskList = div({class:"task-list", style:{marginBottom:"8px"}});
        slotTaskDefs.forEach((task, i) => {
          const done = slotTasks[i] === true;
          const row = div({
            id: `slot-task-${ct.id}-${i}`,
            class: "task-row",
            style: {
              background: done ? `${ct.color}0A` : "transparent",
              border: `1px solid ${done ? ct.color + "40" : "var(--border)"}`,
            },
            onclick: (e) => { e.stopPropagation(); toggleSlotTask(ct.id, i); },
          },
            div({class:"task-checkbox", style:{
              border: `1.5px solid ${done ? ct.color : "var(--dim)"}`,
              background: done ? `${ct.color}25` : "transparent",
              color: ct.color,
            }}, done ? "✓" : ""),
            span({class:"task-text" + (done ? " done" : "")}, task)
          );
          taskList.appendChild(row);
        });
        taskWrap.appendChild(taskList);
        taskWrap.appendChild(div({class:"task-progress-row"},
          div({class:"task-progress-track"},
            div({id:`slot-task-fill-${ct.id}`, class:"task-progress-fill", style:{width:`${slotPct}%`, background:ct.color}})
          ),
          div({id:`slot-task-label-${ct.id}`, class:"task-progress-label"},
            `${slotDoneCnt}/${slotTaskDefs.length}`,
            slotDoneCnt === slotTaskDefs.length && slotTaskDefs.length > 0
              ? span({class:"all-done-badge"}, " ALL DONE") : null
          )
        ));
        panel.appendChild(taskWrap);
      }

      wrap.appendChild(panel);
    });

    return wrap;
  }

  // ─── BUILD: DAY STRIP ─────────────────────────────────────────────────────
  function buildDayStrip() {
    const days = getDays();
    return div({class:"day-strip"},
      ...days.map(date => {
        const ok    = inRange(date);
        const key   = fmtKey(date);
        const m     = ok?getDayMeta(date):null;
        const frac  = doneFrac(date);
        const isSel = state.sel && fmtKey(state.sel)===key;
        const e     = state.entries[key];
        const allDone = frac===1 && e?.slots && CONTENT_TYPES.some(ct => e.slots[ct.id]?.active && (SLOT_TASKS[ct.id]||[]).length > 0);
        const cell = div({
          class:"day-cell"+(ok?"":" out-of-range")+(isSel?" selected":""),
          style: {
            border:`1px solid ${isSel?(m?.accent||"var(--gold)"):(allDone?"#2A3A2A":"var(--border)")}`,
            boxShadow: isSel?`0 0 0 1px ${m?.accent||"var(--gold)"}30`:"none",
          },
          onclick: () => { if(ok) selectDay(date); },
        });
        if(frac>0) cell.appendChild(div({class:"comp-bar", style:{width:`${frac*100}%`,background:m?.accent||"var(--gold)"}}));
        if(allDone) cell.appendChild(div({class:"done-glow", style:{background:`${m?.accent}08`}}));
        cell.appendChild(span({class:"day-short"},DAY_S[date.getDay()]));
        cell.appendChild(div({class:"day-num"+(isSel?" selected":""), style:{color:isSel?(m?.accent||"var(--gold)"):"var(--text)"}},date.getDate()));
        if(m) {
          cell.appendChild(div({class:"day-emoji"},m.emoji));
          cell.appendChild(div({class:"day-label"+(m.isMain?" main":"")+(m.isSpecial?" special":"")},m.label));
          if(e?.title) cell.appendChild(div({class:"day-titled"},"✓ "+e.title));
        }
        return cell;
      })
    );
  }

  // ─── BUILD: DEADLINES ─────────────────────────────────────────────────────
  function buildDeadlines() {
    const today = new Date(); today.setHours(0,0,0,0);
    const todayMs = today.getTime();

    // Collect all entries that have at least one active slot
    const items = [];
    Object.entries(state.entries).forEach(([key, entry]) => {
      if (!entry?.slots) return;
      const date = new Date(key + "T00:00:00");
      if (isNaN(date)) return;
      const dateMs_ = date.getTime();
      const activeSlots = CONTENT_TYPES.filter(ct => entry.slots[ct.id]?.active);
      if (activeSlots.length === 0) return;
      activeSlots.forEach(ct => {
        const slot = entry.slots[ct.id];
        const taskDefs = SLOT_TASKS[ct.id] || [];
        const tasks = slot.tasks || [];
        const doneCnt = tasks.filter(t => t === true).length;
        const total = taskDefs.length;
        items.push({ date, dateMs: dateMs_, key, entry, ct, slot, doneCnt, total });
      });
    });

    // Sort by date
    items.sort((a, b) => a.dateMs - b.dateMs);

    // Group
    const overdue = items.filter(i => i.dateMs < todayMs && i.doneCnt < i.total);
    const doneOld = items.filter(i => i.dateMs < todayMs && i.doneCnt >= i.total && i.total > 0);
    const todayItems = items.filter(i => i.dateMs === todayMs);
    const week = items.filter(i => i.dateMs > todayMs && i.dateMs <= todayMs + 6*86400000);
    const later = items.filter(i => i.dateMs > todayMs + 6*86400000);

    function makeCard(item) {
      const { date, ct, slot, doneCnt, total, entry } = item;
      const pct = total > 0 ? (doneCnt / total) * 100 : 0;
      const isComplete = doneCnt === total && total > 0;
      const statusId = slot.postStatus || "none";
      const statusObj = getStatuses(ct).find(s => s.id === statusId) || getStatuses(ct)[0];
      const dayLabel = `${DAY_F[date.getDay()]}, ${MONTHS[date.getMonth()].slice(0,3)} ${date.getDate()}`;

      const card = div({
        class: "deadline-card",
        style: { borderLeft: `3px solid ${ct.color}`, opacity: isComplete ? "0.6" : "1" },
        onclick: () => goToDay(wkStart(date), date),
      });

      const topRow = div({class:"deadline-card-top"});
      topRow.appendChild(span({class:"deadline-date"}, dayLabel));
      topRow.appendChild(span({class:"deadline-status", style:{color: statusObj.color}}, "● " + statusObj.label));
      card.appendChild(topRow);

      const midRow = div({class:"deadline-card-mid"});
      midRow.appendChild(span({class:"deadline-ct-icon"}, ct.icon));
      const info = div({class:"deadline-ct-info"});
      info.appendChild(div({class:"deadline-ct-label", style:{color:ct.color}}, ct.label));
      if (entry.title) info.appendChild(div({class:"deadline-entry-title"}, entry.title));
      midRow.appendChild(info);
      card.appendChild(midRow);

      if (total > 0) {
        const progRow = div({class:"deadline-prog-row"});
        progRow.appendChild(div({class:"task-progress-track", style:{flex:"1"}},
          div({class:"task-progress-fill", style:{width:`${pct}%`, background: isComplete ? "#4A9F6B" : ct.color}})
        ));
        progRow.appendChild(span({class:"task-progress-label"}, `${doneCnt}/${total}`));
        card.appendChild(progRow);
      }
      return card;
    }

    function makeSection(title, items_, accentColor, emptyMsg) {
      const sec = div({class:"deadline-section"});
      sec.appendChild(div({class:"deadline-section-title", style:{color: accentColor}}, title));
      if (items_.length === 0) {
        sec.appendChild(div({class:"deadline-empty"}, emptyMsg));
      } else {
        items_.forEach(item => sec.appendChild(makeCard(item)));
      }
      return sec;
    }

    const wrap = div({class:"deadline-view"});
    wrap.appendChild(div({class:"overview-title"}, "Upcoming & Recent Upload Dates"));

    if (overdue.length > 0) wrap.appendChild(makeSection("⚠ OVERDUE", overdue, "#A84C4C", ""));
    wrap.appendChild(makeSection("TODAY", todayItems, "#C9A84C", "Nothing scheduled for today"));
    wrap.appendChild(makeSection("THIS WEEK", week, "#4A9F8B", "Nothing coming up this week"));
    wrap.appendChild(makeSection("LATER", later, "var(--muted)", "Nothing further out"));
    if (doneOld.length > 0) wrap.appendChild(makeSection("✓ COMPLETED", doneOld, "#4A9F6B", ""));

    if (items.length === 0) {
      wrap.innerHTML = "";
      wrap.appendChild(div({class:"overview-title"}, "Deadlines"));
      wrap.appendChild(div({class:"deadline-empty", style:{textAlign:"center",padding:"40px 20px"}},
        "NO ENTRIES YET · ADD CONTENT SLOTS TO DAYS TO SEE DEADLINES HERE"
      ));
    }

    return wrap;
  }


  function buildInstallBanner() {
    if(!state.showInstallBanner) return null;
    return div({id:"install-banner"},
      div({class:"install-text"},"Add ",span({},"গল্পবলিয়ে")," to home screen"),
      div({class:"install-actions"},
        btn({class:"dismiss-btn",onclick:dismissInstall},"Later"),
        btn({class:"install-btn",onclick:triggerInstall},"Install"),
      )
    );
  }

  // ─── BUILD: WEEKLY NOTE ───────────────────────────────────────────────────
  function buildWeeklyNote() {
    const note = loadWeekNote();
    const accent = "var(--gold)";
    return div({
      style:{
        background:"var(--card)",
        border:"1px solid var(--border)",
        borderRadius:"10px",
        padding:"16px 18px",
        marginBottom:"28px",
      }
    },
      div({
        style:{
          fontFamily:"'Space Mono',monospace",
          fontSize:"8px",
          letterSpacing:"0.25em",
          textTransform:"uppercase",
          color:"var(--muted)",
          marginBottom:"14px",
        }
      }, `★ Week ${weekNum(state.ws)} Notes`),

      // This week's focus
      div({style:{marginBottom:"14px"}},
        el("label",{
          style:{
            display:"block",
            fontFamily:"'Space Mono',monospace",
            fontSize:"7px",
            letterSpacing:"0.2em",
            textTransform:"uppercase",
            color:"var(--dim)",
            marginBottom:"6px",
          }
        },"This Week's Focus / Goal"),
        el("textarea",{
          placeholder:"What do you want to achieve this week? Any target — subscribers, output, quality...",
          rows:2,
          style:{
            borderColor:"var(--border)",
            minHeight:"60px",
            fontSize:"14px",
          },
          oninput: e => updateWeekNote("focus", e.target.value),
          onfocus: e => e.target.style.borderColor = accent,
          onblur:  e => e.target.style.borderColor = "var(--border)",
        }, note.focus || "")
      ),

      // Retrospective
      div({},
        el("label",{
          style:{
            display:"block",
            fontFamily:"'Space Mono',monospace",
            fontSize:"7px",
            letterSpacing:"0.2em",
            textTransform:"uppercase",
            color:"var(--dim)",
            marginBottom:"6px",
          }
        },"Retrospective — What Worked / What Flopped"),
        el("textarea",{
          placeholder:"Honest reflection. What got traction? What fell flat? What would you do differently?",
          rows:3,
          style:{
            borderColor:"var(--border)",
            minHeight:"80px",
            fontSize:"14px",
          },
          oninput: e => updateWeekNote("retro", e.target.value),
          onfocus: e => e.target.style.borderColor = accent,
          onblur:  e => e.target.style.borderColor = "var(--border)",
        }, note.retro || "")
      ),
    );
  }

  // ─── BUILD: IDEA BANK ────────────────────────────────────────────────────
  function mountFab() {
    if(document.getElementById("idea-fab")) return; // already mounted
    const fab = document.createElement("button");
    fab.id = "idea-fab";
    fab.setAttribute("aria-label", "Idea Bank");
    fab.textContent = "💡";
    fab.addEventListener("click", () => {
      state.ideaBankOpen = !state.ideaBankOpen;
      updateFabBadge();
      if(state.ideaBankOpen) openDrawer();
      else closeDrawer();
    });
    document.body.appendChild(fab);
  }

  function updateFabBadge() {
    const fab = document.getElementById("idea-fab");
    if(!fab) return;
    // Remove existing badge
    const old = fab.querySelector(".fab-badge");
    if(old) old.remove();
    if(state.ideas.length > 0) {
      const badge = document.createElement("span");
      badge.className = "fab-badge";
      badge.textContent = state.ideas.length > 9 ? "9+" : String(state.ideas.length);
      fab.appendChild(badge);
    }
  }

  function openDrawer() {
    closeDrawer(); // remove any existing first
    const drawer = document.createElement("div");
    drawer.id = "idea-drawer";

    // Header
    const hdr = document.createElement("div");
    hdr.className = "idea-drawer-header";
    hdr.innerHTML = `<div><div class="idea-drawer-title">💡 Idea Bank</div><div class="idea-drawer-sub">${state.ideas.length} IDEAS · CAPTURE EVERYTHING</div></div>`;
    const closeBtn = document.createElement("button");
    closeBtn.style.cssText = "background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;";
    closeBtn.textContent = "✕";
    closeBtn.addEventListener("click", () => { state.ideaBankOpen = false; closeDrawer(); });
    hdr.appendChild(closeBtn);
    drawer.appendChild(hdr);

    // Input row
    const inputRow = document.createElement("div");
    inputRow.className = "idea-input-row";
    const ideaInput = document.createElement("input");
    ideaInput.type = "text";
    ideaInput.placeholder = "Write any story idea, book title, hook, concept...";
    const addBtn = document.createElement("button");
    addBtn.className = "idea-add-btn";
    addBtn.textContent = "+ Add";
    const doAdd = () => {
      if(!ideaInput.value.trim()) return;
      addIdea(ideaInput.value);
      ideaInput.value = "";
      updateFabBadge();
      refreshDrawerList();
      showToast("💡 Idea saved");
    };
    addBtn.addEventListener("click", doAdd);
    ideaInput.addEventListener("keydown", e => { if(e.key === "Enter") doAdd(); });
    inputRow.appendChild(ideaInput);
    inputRow.appendChild(addBtn);
    drawer.appendChild(inputRow);

    // List
    const list = document.createElement("div");
    list.id = "idea-list";
    list.className = "idea-list";
    drawer.appendChild(list);

    document.body.appendChild(drawer);
    refreshDrawerList();
  }

  function closeDrawer() {
    const d = document.getElementById("idea-drawer");
    if(d) d.remove();
  }

  function refreshDrawerList() {
    const list = document.getElementById("idea-list");
    if(!list) return;
    list.innerHTML = "";
    const sorted = [...state.ideas].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0));
    if(sorted.length === 0) {
      const empty = document.createElement("div");
      empty.className = "idea-empty";
      empty.textContent = "NO IDEAS YET · TYPE ABOVE TO START";
      list.appendChild(empty);
    } else {
      sorted.forEach(idea => {
        const ts = new Date(idea.ts);
        const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const tsStr = `${ts.getDate()} ${MONTHS_SHORT[ts.getMonth()]} ${ts.getFullYear()}`;

        const item = document.createElement("div");
        item.className = "idea-item";

        const pinBtn = document.createElement("button");
        pinBtn.className = "idea-pin-btn" + (idea.pinned ? " pinned" : "");
        pinBtn.textContent = idea.pinned ? "★" : "☆";
        pinBtn.addEventListener("click", () => { pinIdea(idea.id); updateFabBadge(); refreshDrawerList(); });

        const middle = document.createElement("div");
        middle.className = "flex-1";
        const txt = document.createElement("div");
        txt.className = "idea-text";
        txt.textContent = idea.text;
        const tsDom = document.createElement("div");
        tsDom.className = "idea-ts";
        tsDom.textContent = tsStr;
        middle.appendChild(txt);
        middle.appendChild(tsDom);

        const delBtn = document.createElement("button");
        delBtn.className = "idea-del-btn";
        delBtn.textContent = "✕";
        delBtn.addEventListener("click", () => {
          if(confirm("Delete this idea?")) {
            deleteIdea(idea.id);
            updateFabBadge();
            refreshDrawerList();
          }
        });

        item.appendChild(pinBtn);
        item.appendChild(middle);
        item.appendChild(delBtn);
        list.appendChild(item);
      });
    }
  }

  function renderIdeaBank() {
    mountFab();
    updateFabBadge();
    // If drawer should be open but isn't, open it; if it's open but shouldn't be, close it
    const drawerExists = !!document.getElementById("idea-drawer");
    if(state.ideaBankOpen && !drawerExists) openDrawer();
    if(!state.ideaBankOpen && drawerExists) closeDrawer();
  }

  // ─── MAIN RENDER ──────────────────────────────────────────────────────────
  function render() {
    const root = document.getElementById("root");
    const days = getDays();
    const pct  = overallPct();
    const tl   = totalLogged();
    const td   = totalDone();

    root.innerHTML = "";

    const header = el("header",{},
      div({class:"header-eyebrow"},"Content Journal · গল্পবলিয়ে অভিযাত্রিক"),
      el("h1",{},"গল্পবলিয়ে অভিযাত্রিক"),
      div({class:"header-dates"}, (function(){
        const days = getDays();
        const monStart = days[0];
        const sunEnd   = days[6];
        const fmt = d => `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
        return `${fmt(monStart)} – ${fmt(sunEnd)}, ${monStart.getFullYear()} · Ongoing`;
      })()),
      div({class:"stats-row"},
        ...[ ["Episodes Titled",tl], ["Tasks Done",td], ["Completion",pct+"%"], ["Week",weekNum(state.ws)] ]
          .map(([l,v])=>div({class:"stat-item"},div({class:"stat-val"},String(v)),div({class:"stat-label"},l)))
      ),
      totalTasks()>0 ? div({class:"progress-wrap"},
        div({class:"progress-track"},div({class:"progress-fill",style:{width:pct+"%"}})),
        div({class:"progress-label"},"OVERALL PROGRESS"),
      ) : null,
      div({class:"view-switcher"},
        btn({class:"view-btn"+(state.view==="week"?" active":""),onclick:()=>switchView("week")},"Weekly View"),
        btn({class:"view-btn"+(state.view==="overview"?" active":""),onclick:()=>switchView("overview")},"Full Overview"),
        btn({class:"view-btn"+(state.view==="deadlines"?" active":""),onclick:()=>switchView("deadlines")},"Deadlines"),
      )
    );
    root.appendChild(header);
    root.appendChild(buildDataToolbar());

    if(state.view==="week") {
      const nav = div({class:"week-nav"},
        btn({class:"ghost-btn",onclick:prevWeek,disabled:dateMs(state.ws)<=dateMs(wkStart(START_DATE))},"←"),
        div({},
          div({class:"week-title"},weekLabel(days)),
          div({class:"week-sub"},`WEEK ${weekNum(state.ws)}`),
        ),
        btn({class:"ghost-btn",onclick:nextWeek},"→"),
      );
      root.appendChild(nav);
      root.appendChild(btn({class:"jump-btn",onclick:goWeek1},"↩ Jump to Week 1"));
      root.appendChild(buildDayStrip());

      if(state.sel) root.appendChild(buildDetail());
      else {
        root.appendChild(buildWeekList());
        root.appendChild(buildWeeklyNote());
      }
    } else if(state.view==="deadlines") {
      root.appendChild(buildDeadlines());
    } else {
      root.appendChild(buildOverview());
    }

    // Legend — content types
    root.appendChild(div({class:"legend"},
      div({class:"legend-title"},"Content Types"),
      div({class:"legend-items"},
        ...CONTENT_TYPES.map(ct =>
          div({class:"legend-item"},
            span({class:"legend-emoji"},ct.icon),
            span({class:"legend-label",style:{color:ct.color}},ct.label)
          )
        )
      )
    ));

    const banner = buildInstallBanner();
    if(banner) root.appendChild(banner);

    // Idea Bank FAB + Drawer (outside root, attached to body)
    renderIdeaBank();
  }

  // ─── PWA INSTALL ──────────────────────────────────────────────────────────
  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault();
    state.deferredPrompt = e;
    state.showInstallBanner = true;
    render();
  });
  window.addEventListener("appinstalled", () => {
    state.showInstallBanner = false;
    state.deferredPrompt = null;
    render();
  });
  function triggerInstall() {
    if(state.deferredPrompt) {
      state.deferredPrompt.prompt();
      state.deferredPrompt.userChoice.then(()=>{
        state.deferredPrompt = null;
        state.showInstallBanner = false;
        render();
      });
    }
  }
  function dismissInstall() { state.showInstallBanner = false; render(); }

  // ─── THEME ────────────────────────────────────────────────────────────────
  function loadTheme() {
    try { if(localStorage.getItem("theme") === "light") document.documentElement.classList.add("light"); } catch{}
  }
  function mountThemeToggle() {
    if(document.getElementById("theme-toggle")) return;
    const btn = document.createElement("button");
    btn.id = "theme-toggle";
    btn.setAttribute("aria-label", "Toggle theme");
    const isLight = () => document.documentElement.classList.contains("light");
    btn.textContent = isLight() ? "🌙" : "☀️";
    btn.addEventListener("click", () => {
      document.documentElement.classList.toggle("light");
      btn.textContent = isLight() ? "🌙" : "☀️";
      try { localStorage.setItem("theme", isLight() ? "light" : "dark"); } catch{}
    });
    document.body.appendChild(btn);
  }

  // ─── BOOT ─────────────────────────────────────────────────────────────────
  loadTheme();
  loadEntries();
  loadIdeas();
  render();
  mountFab();
  mountThemeToggle();
  </script>
</body>
</html>
